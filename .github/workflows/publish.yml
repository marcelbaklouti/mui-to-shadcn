name: Publish to npm

# Publishes automatically when package.json's "version" changes on main
# (e.g. after merging a PR that ran `npm version`). A guard skips the publish
# when the current version is already on npm, so ordinary merges are a no-op.
# Uses npm Trusted Publishing (OIDC): no NPM_TOKEN secret, provenance is automatic.
# One-time setup: configure a Trusted Publisher for this repo + workflow "publish.yml" at
# https://www.npmjs.com/package/mui-to-shadcn/access

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # id-token: publish provenance; contents: create the version tag/release
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest # ensure npm >= 11.5.1 for OIDC trusted publishing
      - run: npm ci
      - name: Check whether this version is already on npm
        id: version
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "new=false" >> "$GITHUB_OUTPUT"
            echo "::notice::$name@$version is already published — skipping."
          else
            echo "new=true" >> "$GITHUB_OUTPUT"
          fi
      # prepublishOnly runs clean + build + test before the actual publish.
      - name: Publish
        if: steps.version.outputs.new == 'true'
        run: npm publish --provenance
      - name: Tag the release
        if: steps.version.outputs.new == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v${{ steps.version.outputs.version }}" --title "v${{ steps.version.outputs.version }}" --generate-notes
